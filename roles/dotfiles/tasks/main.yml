- block:

  - name: checkout dotfiles
    git:
      repo: https://github.com/tomkenta/dotfiles.git
      dest: ~/work/src/github.com/tomkenta/dotfiles

  - name: create symlinks
    file:
      src:  ~/work/src/github.com/tomkenta/dotfiles/{{ item.name }}
      dest: ~/{{ item.name }}
      state: link
      force: yes
    with_items: '{{ dot_files }}'

  - name: create symlink for karabiner
    file:
      src:  ~/work/src/github.com/tomkenta/dotfiles/.config/karabiner/karabiner.json
      dest: ~/.config/karabiner/karabiner.json
      state: link
      force: yes


  tags:
    - dotfiles
