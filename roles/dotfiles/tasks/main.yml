- block:

  - name: checkout dotfiles
    git:
      repo: https://github.com/tomkenta/dotfiles.git
      dest: ~/src/github.com/tomkenta/dotfiles

  - name: create symlinks
    file:
      src:  ~/src/github.com/tomkenta/dotfiles/{{ item.name }}
      dest: ~/{{ item.name }}
      state: link
      force: yes
    with_items: '{{ dot_files }}'

  # - name: create symlink for karabiner
