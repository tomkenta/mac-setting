- block:

  - name: 設定ファイルのバックアップ
    shell: 'dafaults read > before_defaults'

  - name: キーリピート検知待ち時間
    osx_defaults:
      key: InitialKeyRepeat
      type: int
      value: 10
      state: present

  - name: キーリピート間隔時間
    osx_defaults:
      key: KeyRepeat
      type: int
      value: 1
      state: present

  - name: Dock autohide
    osx_defaults:
      domain: com.apple.dock
      key: autohide
      type: bool
      value: true
      state: present

  - name: バッテリー残量設定
    osx_defaults:
      domain: com.apple.menuextra.battery
      key: ShowPercent
      type: string
      value: YES
      state: present

  - name: トラックパッドタップの有効化
    osx_defaults:
      domain: com.apple.AppleMultitouchTrackpad
      key: Clicking
      type: int
      value: 1
      state: present

  - name: "Keyboard - Full Keyboard Access (1:text , list only 3: all)"
    osx_defaults:
      domain: 'NSGlobalDomain',
      key: 'AppleKeyboardUIMode',
      type: int,
      value: 3

  - name: 現在の設定ファイルのバックアップ
    shell: 'dafaults read > after_defaults'

  tags:
    - fisherman