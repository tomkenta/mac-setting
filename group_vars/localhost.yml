# パッケージ/アプリ/VS Code拡張のインストールは Brewfile に一本化済み (setting.sh の `brew bundle`)。
# ここでは ansible が直接扱う dotfiles のシンボリックリンク対象のみを定義する。

dot_files:
  - name: .zprofile          # Apple Silicon: brew shellenv を通す (新規)
  - name: .bash_profile
  - name: .bashrc
  - name: .tmux.conf
  - name: .vimrc
  - name: .gitconfig
  - name: .gitattributes
  - name: .gitignore_global
  - name: .config            # fish / karabiner 設定一式
