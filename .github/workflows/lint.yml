name: Lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning

  json-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          for f in vscode/settings.json vscode/keybindings.json RectangleConfig.json; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f"
          done
